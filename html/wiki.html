                    <i class="fa-solid fa-shuffle"></i>

            <div class="search-box" id="search-box-container" style="position: relative;">
                <input type="text" id="search-input" placeholder="여기에서 검색" autocomplete="off">
                <i class="fa-solid fa-magnifying-glass" id="search-btn"></i>

        </div>

        <!-- 2. 나무위키 스타일 실시간 검색어 창 -->
        <div class="mvd">
            <div class="realtime-header">
                <span>실시간 인기 검색어</span>
                <i class="fa-solid fa-rotate-right" style="font-size: 14px; cursor:pointer;"
                    onclick="updateRanking()"></i>
            </div>
            <ul class="realtime-list" id="realtime-container">
                <!-- JS가 이 안에 1~10위 리스트를 채워 넣습니다 -->
            </ul>
        </div>
    </div>
