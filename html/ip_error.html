<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근 차단 - 백룸위키</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/ip_error.css">
</head>

<body>

    <div class="error-container">
        <i class="fa-solid fa-triangle-exclamation warning-icon"></i>
        
        <h1 class="error-title">접근이 차단되었습니다 (403 Forbidden)</h1>
        
        <p class="error-desc">
            현재 접속하신 IP 대역(해외 및 비정상적 노클립 라우팅 경로)은 보안상의 이유로 차단되었습니다.<br>
            백룸위키 데이터베이스는 승인된 프론트룸 로컬 네트워크 및 M.E.G. 인트라넷에서만 접근 가능합니다.
        </p>
        
        <div class="error-details">
            <strong>Error Code:</strong> ERR_UNAUTHORIZED_REALITY<br>
            <strong>Client IP:</strong> Unregistered / Outside Area
        </div>

        <a href="http://127.0.0.1:5500/html/login.html" class="return-btn">
            <i class="fa-solid fa-arrow-left"></i> 로그인 화면으로 돌아가기
        </a>
    </div>

</body>

</html>
