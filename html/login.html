<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.E.G. 요원 인증</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-diagram-project login-logo"></i>
            <h1 id="header-title">백룸위키 인트라넷</h1>
            <p id="header-desc">M.E.G. 인가자 전용 데이터베이스</p>
        </div>

        <!-- 토글 버튼 영역 -->
        <div class="form-toggle">
            <button id="btn-login" class="active">로그인</button>
            <button id="btn-signup">신규 요원 등록</button>
        </div>

        <!-- 1. 로그인 폼 -->
        <form class="auth-form" id="form-login">
            <div class="input-group">
                <label for="login-id">요원 ID</label>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="login-id" placeholder="ID를 입력하세요" required>
                </div>
            </div>

            <div class="input-group">
                <label for="login-password">인가 암호</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" minlength="8" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">접속 승인 요청</button>
        </form>

        <!-- 2. 회원가입 폼 (처음엔 숨김 처리) -->
        <form class="auth-form hidden" id="form-signup">
            <div class="input-group">
                <label for="signup-id">신규 요원 ID (최소 4자)</label>
                <div class="input-box">
                    <i class="fa-solid fa-id-badge"></i>
                    <input type="text" id="signup-id" placeholder="사용할 ID 입력" minlength="4" required>
                </div>
            </div>

            <div class="input-group">
                <label for="signup-password">보안 암호 설정 (최소 8자)</label>
                <div class="input-box">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="signup-password" placeholder="8자 이상 비밀번호 입력" minlength="8" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">요원 등록 승인</button>
        </form>

        <div class="login-footer" id="login-footer">
            <a href="ip_error.html">ip_error창 보기</a>
        </div>
    </div>


    <script>
        const btnLogin = document.getElementById('btn-login');
        const btnSignup = document.getElementById('btn-signup');
        const formLogin = document.getElementById('form-login');
        const formSignup = document.getElementById('form-signup');
        const headerTitle = document.getElementById('header-title');
        const headerDesc = document.getElementById('header-desc');

        // [기존 코드 유지] 탭 전환: 로그인 클릭 시
        btnLogin.addEventListener('click', () => {
            btnLogin.classList.add('active');
            btnSignup.classList.remove('active');

            formLogin.classList.remove('hidden');
            formSignup.classList.add('hidden');

            headerTitle.textContent = '백룸위키 인트라넷';
            headerDesc.textContent = 'M.E.G. 인가자 전용 데이터베이스';
        });

        // [기존 코드 유지] 탭 전환: 회원가입 클릭 시
        btnSignup.addEventListener('click', () => {
            btnSignup.classList.add('active');
            btnLogin.classList.remove('active');

            formSignup.classList.remove('hidden');
            formLogin.classList.add('hidden');

            headerTitle.textContent = '신규 요원 등록';
            headerDesc.textContent = '안전한 위키 열람을 위한 권한 생성';
        });

        // ----------------------------------------------------
        // 1. [로그인] 제출 시 DB 서버와 통신하는 기능
        // ----------------------------------------------------
        formLogin.addEventListener('submit', async function (e) {
            e.preventDefault(); // 새로고침 방지

            const userId = document.getElementById('login-id').value;
            const userPw = document.getElementById('login-password').value;

            try {
                // 백엔드 서버의 로그인 주소로 데이터 전송
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userId, password: userPw })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message); // "로그인 성공!" 메시지창
                    window.location.href = "wiki.html"; // 메인 화면으로 이동
                } else {
                    alert(result.message); // "비밀번호 틀림" 등 에러 메시지창
                }
            } catch (error) {
                console.error("서버 에러:", error);
                alert("서버가 꺼져있거나 연결할 수 없습니다.");
            }
        });

        // ----------------------------------------------------
        // 2. [회원가입] 제출 시 DB 서버에 요원을 등록하는 기능
        // ----------------------------------------------------
        formSignup.addEventListener('submit', async function (e) {
            e.preventDefault(); // 새로고침 방지

            const userId = document.getElementById('signup-id').value;
            const userPw = document.getElementById('signup-password').value;

            try {
                // 백엔드 서버의 회원가입 주소로 데이터 전송
                const response = await fetch('http://localhost:3000/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userId, password: userPw })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message); // "신규 요원 등록 완료!"
                    btnLogin.click(); // 가입 성공하면 자동으로 로그인 탭으로 이동시킴
                } else {
                    alert(result.message); // "이미 존재하는 ID입니다" 등 에러 처리
                }
            } catch (error) {
                console.error("서버 에러:", error);
                alert("서버가 꺼져있거나 연결할 수 없습니다.");
            }
        });
    </script>

</body>

</html>
