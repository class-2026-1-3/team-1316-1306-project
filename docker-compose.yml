version: '3.8'

services:
  # [프론트엔드] 정적 웹 서버 (Nginx)
  my-static-web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html
    restart: always
    depends_on:
      - my-wiki-db # DB가 먼저 켜진 후에 웹 서버가 켜지도록 설정

  # [백엔드/DB] 위키 데이터베이스 (MySQL 8.0)
  my-wiki-db:
    image: mysql:8.0
    ports:
      - "3307:3306" # 내 컴퓨터에서 DB 툴(DBeaver 등)로 접속할 수 있게 포트 개방
    environment:
      MYSQL_ROOT_PASSWORD: root_password_1234 # 루트 비밀번호
      MYSQL_DATABASE: wikidb                  # 자동으로 생성될 데이터베이스 이름
      MYSQL_USER: wiki_user                   # 기본 사용자 계정
      MYSQL_PASSWORD: wiki_password           # 기본 사용자 비밀번호
    volumes:
      # 중요! 1번에서 만든 init.sql을 도커 초기화 폴더에 넣어 자동으로 테이블을 만들게 합니다.
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # 도커 컨테이너가 꺼져도 데이터가 사라지지 않고 내 컴퓨터에 저장되도록 볼륨 설정
      - my_wiki_db_data:/var/lib/mysql
    restart: always

# 고유 데이터 보존을 위한 볼륨 정의
volumes:
  my_wiki_db_data: